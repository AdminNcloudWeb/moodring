# XcodeGen spec — generates Moodring.xcodeproj.
#
#   brew install xcodegen      (one time)
#   cd ios && xcodegen generate
#   open Moodring.xcodeproj
#
# Then set your Development Team on both targets (Signing & Capabilities) and
# you're ready to build/run. See README.md for the full walkthrough.

name: Moodring
options:
  bundleIdPrefix: co.willpickles
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # <-- set this to your 10-char Team ID (or set in Xcode)

targets:
  Moodring:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: App
    dependencies:
      - package: Supabase
      - target: MoodringWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.willpickles.moodring
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Moodring
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Moodring
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: Unlock Moodring with Face ID to keep your mood history private.
        CFBundleURLTypes:
          - CFBundleURLSchemes: [moodring]
    entitlements:
      path: App/Moodring.entitlements
      properties:
        com.apple.security.application-groups:
          - group.co.willpickles.moodring

  MoodringWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: Widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.willpickles.moodring.widget
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Moodring
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/MoodringWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.co.willpickles.moodring
